device: &device 'cuda'
seed: &seed 0

main:
  interpolate_pos_step_size: &interpolate_pos_step_size 0.03  # smaller -> denser dense path -> smoother SO-101 trajectory
  interpolate_rot_step_size: &interpolate_rot_step_size 0.10  # ~5.7 deg per step (was 10 deg, too aggressive for IK to track)
  grasp_depth: 0.02   # SO-101 finger length is 0.035m; push 2cm into the object to seat it before closing
  constraint_tolerance: 0.05  # tighter (was 0.10): we want subgoal cost to actually drive task progress, not be auto-satisfied
  bounds_min: &bounds_min [-0.25, -0.25, 0.75]   # SO-101 fixed at [0,-0.15,0.75]; reach radius ~0.32m, stay inside
  bounds_max: &bounds_max [0.25, 0.25, 1.05]
  sdf_voxel_size: 0.01
  vlm_camera: 0
  action_steps_per_iter: 50  # was 5 -> path was never drained for SO-101 (small workspace = ~16 dense waypoints/replan)
  seed: *seed

env:
  video_cache_size: 2000
  og_sim:
    physics_frequency: 120
    action_frequency: 30
    
  scene:
    type: Scene
    use_floor_plane: true
    floor_plane_visible: false

  bounds_min: *bounds_min
  bounds_max: *bounds_max
  interpolate_pos_step_size: *interpolate_pos_step_size
  interpolate_rot_step_size: *interpolate_rot_step_size

  robot:
    robot_config:
      name: so101
      type: SO101
      obs_modalities: []
      action_modalities: continuous
      action_normalize: False
      position: [0.0, -0.15, 0.75]
      grasping_mode: assisted

      controller_config:
        arm_0:
          name: JointController
          motor_type: position
          command_input_limits:
          command_output_limits:
          use_delta_commands: false
          use_impedances: false
        gripper_0:
          name: MultiFingerGripperController
          mode: binary
          inverted: true

  camera:
    # recorder
    1:
      name: record_camera
      position: [0.55, -0.65, 1.15]
      orientation: [0.520686, 0.202538, 0.300668, 0.772957]
      resolution: 640

    # vlm camera
    0:
      name: vlm_camera
      position: [0.0, -0.05, 1.42]
      orientation: [0.0, 0.0, 0.0, 1.0]
      resolution: 720

path_solver:
  opt_pos_step_size: 0.04   # was 0.06; smaller -> more control points -> SO-101 can track rotation between them
  opt_rot_step_size: 0.40   # was 0.78 (~45 deg, way too coarse for 5-DOF Lula CCD); 0.40 ~= 23 deg
  opt_interpolate_pos_step_size: 0.02
  opt_interpolate_rot_step_size: 0.10
  max_collision_points: 60
  sampling_maxfun: 5000
  bounds_min: *bounds_min
  bounds_max: *bounds_max
  constraint_tolerance: 0.0001
  minimizer_options:
    maxiter: 200

subgoal_solver:
  bounds_min: *bounds_min
  bounds_max: *bounds_max
  sampling_maxfun: 5000
  max_collision_points: 60
  constraint_tolerance: 0.0001
  minimizer_options:
    maxiter: 200

keypoint_proposer:
  num_candidates_per_mask: 5
  min_dist_bt_keypoints: 0.03
  max_mask_ratio: 0.5
  device: *device
  bounds_min: *bounds_min
  bounds_max: *bounds_max
  seed: *seed

constraint_generator:
  model: gpt-4o-2024-11-20   # newer snapshot -> noticeably fewer logic errors when writing constraint funcs
  temperature: 0.0
  max_tokens: 2048

visualizer:
  bounds_min: *bounds_min
  bounds_max: *bounds_max
